type Kanji {
  literal: String!
  readings_on: [String!]!
  readings_kun: [String!]!
  meanings: [String!]!
}

type SearchResults {
  searchQuery: String!
  kanji: [Kanji!]!
}

type Query {
  hello: String!
  kanji(literal: String!): Kanji
  kanjiByMeaning(meaning: String!): [Kanji!]!
  search(searchQuery: String!): SearchResults!
}
